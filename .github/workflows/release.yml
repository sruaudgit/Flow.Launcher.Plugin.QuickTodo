name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish plugin
        shell: pwsh
        run: dotnet publish .\Flow.Launcher.Plugin.QuickTodo.csproj -c Release -o .\artifacts\QuickTodo

      - name: Pack plugin
        shell: pwsh
        run: Compress-Archive -Path .\artifacts\QuickTodo\* -DestinationPath .\Flow.Launcher.Plugin.QuickTodo.zip -Force

      - name: Create or update release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Try to create the release, if it exists, just upload the asset
          gh release create "${{ github.ref_name }}" .\Flow.Launcher.Plugin.QuickTodo.zip --title "${{ github.ref_name }}" --generate-notes 2>/dev/null || gh release upload "${{ github.ref_name }}" .\Flow.Launcher.Plugin.QuickTodo.zip --clobber